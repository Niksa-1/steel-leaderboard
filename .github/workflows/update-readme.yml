name: Update README

on:
  push:
    branches:
      - main
    paths:
      - "src/data/**.json"
      - "src/data/index.ts"
      - "src/lib/benchmark-hub.ts"
      - "src/scripts/update-readme.ts"
      - ".github/workflows/update-readme.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update README
        run: npm run update-readme

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: update leaderboard in README"
          title: "docs: update leaderboard in README"
          body: "Automatically updating README with latest leaderboard information"
          branch: update-readme
          delete-branch: true
